<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Okos Kamra</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    textarea::-webkit-scrollbar { width: 8px; }
    textarea::-webkit-scrollbar-track { background: transparent; }
    textarea::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    #db-loading { display: none; }
    #db-loading.active { display: flex; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased min-h-screen pb-20 md:pb-0 md:pl-64">

  <div id="db-loading" class="fixed top-4 right-4 bg-indigo-600 text-white px-4 py-2 rounded-xl shadow-lg items-center gap-2 z-50 transition-opacity">
    <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Szinkronizálás...
  </div>

  <nav class="fixed bottom-0 left-0 right-0 md:top-0 md:w-64 bg-white border-t md:border-t-0 md:border-r border-slate-200 z-50 p-4 flex md:flex-col justify-around md:justify-start gap-2">
    <div class="hidden md:flex items-center gap-2 mb-8 px-2">
      <div class="bg-indigo-600 p-2 rounded-xl text-white">
        <i data-lucide="package" class="w-6 h-6"></i>
      </div>
      <h1 class="text-xl font-bold text-slate-800 tracking-tight">Okos Kamra</h1>
    </div>
    <button data-tab="inventory" class="nav-btn flex flex-col md:flex-row items-center gap-3 px-4 py-3 rounded-xl transition-all bg-indigo-50 text-indigo-700 font-semibold">
      <i data-lucide="clipboard-list" class="w-5 h-5 md:w-6 md:h-6"></i>
      <span class="text-[10px] md:text-sm">Leltár</span>
    </button>
    <button data-tab="add" class="nav-btn flex flex-col md:flex-row items-center gap-3 px-4 py-3 rounded-xl transition-all text-slate-500 hover:bg-slate-100 hover:text-slate-700">
      <i data-lucide="plus" class="w-5 h-5 md:w-6 md:h-6"></i>
      <span class="text-[10px] md:text-sm">Hozzáadás</span>
    </button>
    <button data-tab="chef" class="nav-btn flex flex-col md:flex-row items-center gap-3 px-4 py-3 rounded-xl transition-all text-slate-500 hover:bg-slate-100 hover:text-slate-700">
      <i data-lucide="chef-hat" class="w-5 h-5 md:w-6 md:h-6"></i>
      <span class="text-[10px] md:text-sm">Séf Segéd</span>
    </button>
    <button data-tab="stats" class="nav-btn flex flex-col md:flex-row items-center gap-3 px-4 py-3 rounded-xl transition-all text-slate-500 hover:bg-slate-100 hover:text-slate-700">
      <i data-lucide="bar-chart-3" class="w-5 h-5 md:w-6 md:h-6"></i>
      <span class="text-[10px] md:text-sm">Statisztika</span>
    </button>
  </nav>

  <main class="p-4 md:p-8 max-w-5xl mx-auto" id="main-content">
    <section id="tab-inventory" class="tab-content fade-in">
      <div id="expiring-alert-container"></div>
      <div class="space-y-6">
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
          <div>
            <h2 class="text-2xl font-bold text-slate-800">Aktuális készlet</h2>
            <p class="text-slate-500 font-medium" id="inventory-count">Adatok betöltése...</p>
          </div>
          <button onclick="clearAllItems()" class="px-4 py-2 bg-rose-50 text-rose-600 rounded-xl hover:bg-rose-100 transition font-bold text-sm flex items-center gap-2 border border-rose-200">
            <i data-lucide="trash-2" class="w-4 h-4"></i> Mindent töröl
          </button>
        </header>
        <div id="inventory-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
      </div>
    </section>

    <!-- (A többi tab változatlan) -->
    <section id="tab-add" class="tab-content hidden fade-in">
      <div class="max-w-2xl mx-auto space-y-6">
        <header>
          <h2 class="text-2xl font-bold text-slate-800">Beolvasás</h2>
          <p class="text-slate-500 italic text-sm">Másold be a Gem által generált listát!</p>
        </header>
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
          <textarea id="parse-input" class="w-full h-64 p-4 rounded-2xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none resize-none bg-slate-50 font-mono text-sm"></textarea>
          <button id="parse-btn" disabled class="w-full mt-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl transition-all flex items-center justify-center gap-2 disabled:opacity-50 shadow-lg disabled:cursor-not-allowed">
            Feldolgozás
          </button>
        </div>
      </div>
    </section>

    <section id="tab-chef" class="tab-content hidden fade-in">
      <div class="space-y-6">
        <header>
          <h2 class="text-2xl font-bold text-slate-800">AI Szakács</h2>
        </header>
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
          <div class="flex gap-2 mb-4">
            <input type="text" id="ai-prompt" placeholder="Miből főzzek?" class="flex-1 p-4 rounded-2xl bg-slate-50 border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none" />
            <button id="ask-chef-btn" class="bg-indigo-600 text-white p-4 rounded-2xl hover:bg-indigo-700 transition-colors">Kérdez</button>
          </div>
          <div id="chef-response-container"></div>
        </div>
      </div>
    </section>

    <section id="tab-stats" class="tab-content hidden fade-in">
      <div class="space-y-6">
        <header>
          <h2 class="text-2xl font-bold text-slate-800">Statisztika</h2>
        </header>
        <div class="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
              <tbody id="stats-tbody" class="divide-y divide-slate-100"></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    let items = [];
    let activeTab = 'inventory';
    let isAiLoading = false;
    const loadingBadge = document.getElementById('db-loading');

    // HIBAKERESŐ BETÖLTÉS
    async function loadItems() {
      loadingBadge.classList.add('active');
      try {
        const res = await fetch('/api/db');
        const data = await res.json();
        
        // Ha nyakon csíptük a hibát:
        if (data && data._error) {
          document.getElementById('inventory-count').innerHTML = `<span class="text-rose-600 font-bold bg-rose-50 p-2 rounded-lg">${data.üzenet}</span>`;
          return;
        }

        items = data || [];
        renderAll();
      } catch (e) {
        document.getElementById('inventory-count').innerHTML = `<span class="text-rose-600 font-bold">Fájl hiba: Nem találom az api/db.js fájlt a szerveren!</span>`;
      } finally {
        loadingBadge.classList.remove('active');
      }
    }

    async function saveItems() {
      loadingBadge.classList.add('active');
      renderAll(); 
      try {
        await fetch('/api/db', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ items: items })
        });
      } catch (e) {
        alert("Mentési hiba!");
      } finally {
        loadingBadge.classList.remove('active');
      }
    }

    window.clearAllItems = function() {
      if (confirm("Biztosan törölni akarsz MINDENT a közös kamrából?")) {
        items = [];
        saveItems();
      }
    };

    const navButtons = document.querySelectorAll('.nav-btn');
    const tabContents = document.querySelectorAll('.tab-content');
    const inventoryGrid = document.getElementById('inventory-grid');
    const inventoryCount = document.getElementById('inventory-count');
    const expiringAlertContainer = document.getElementById('expiring-alert-container');
    const parseInput = document.getElementById('parse-input');
    const parseBtn = document.getElementById('parse-btn');
    const aiPromptInput = document.getElementById('ai-prompt');
    const askChefBtn = document.getElementById('ask-chef-btn');
    const chefResponseContainer = document.getElementById('chef-response-container');
    const statsTbody = document.getElementById('stats-tbody');

    lucide.createIcons();

    function renderAll() {
      renderInventory();
      renderStats();
      lucide.createIcons(); 
    }

    function renderInventory() {
      const activeItems = items.filter(i => i.status === 'active');
      const today = new Date();
      const fiveDaysLater = new Date();
      fiveDaysLater.setDate(today.getDate() + 5);

      const expiringSoon = activeItems.filter(item => {
        const expiry = new Date(item.expiryDate);
        return expiry <= fiveDaysLater && expiry >= today;
      });

      const totalUnits = activeItems.reduce((acc, curr) => acc + (curr.quantity || 1), 0);
      inventoryCount.innerHTML = `<span class="text-slate-500 font-medium">Összesen ${totalUnits} darab termék.</span>`;

      if (expiringSoon.length > 0) {
        const names = expiringSoon.map(i => i.name).join(', ');
        expiringAlertContainer.innerHTML = `<div class="mb-6 bg-amber-50 border border-amber-200 rounded-2xl p-4 flex items-start gap-4"><div class="bg-amber-100 p-2 rounded-full text-amber-600"><i data-lucide="alert-triangle" class="w-5 h-5"></i></div><div><h3 class="font-bold text-amber-800">Lejáró termékek!</h3><p class="text-sm text-amber-700">Az alábbi termékek 5 napon belül lejárnak: ${names}.</p></div></div>`;
      } else {
        expiringAlertContainer.innerHTML = '';
      }

      if (activeItems.length === 0) {
        inventoryGrid.innerHTML = `<div class="col-span-full py-20 text-center bg-white rounded-3xl border-2 border-dashed border-slate-200"><h3 class="text-lg font-medium text-slate-600">Üres a kamra</h3></div>`;
      } else {
        activeItems.sort((a,b) => new Date(a.expiryDate) - new Date(b.expiryDate));
        inventoryGrid.innerHTML = activeItems.map(item => {
          const isExpiring = new Date(item.expiryDate) <= today;
          return `<div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex flex-col h-full"><div class="flex justify-between items-start mb-2"><span class="text-xs font-bold uppercase tracking-wider text-indigo-500">${item.brand}</span><div class="flex gap-1"><button data-action="consume-one" data-id="${item.id}" class="p-1.5 text-indigo-600 hover:bg-indigo-50 rounded-lg"><i data-lucide="minus-circle" class="w-[18px] h-[18px]"></i></button><button data-action="consume-all" data-id="${item.id}" class="p-1.5 text-emerald-600 hover:bg-emerald-50 rounded-lg"><i data-lucide="check-circle" class="w-[18px] h-[18px]"></i></button><button data-action="delete" data-id="${item.id}" class="p-1.5 text-rose-500 hover:bg-rose-50 rounded-lg"><i data-lucide="trash-2" class="w-[18px] h-[18px]"></i></button></div></div><h4 class="text-lg font-bold text-slate-800 mb-1">${item.name}</h4><div class="flex flex-wrap gap-3 mb-4 text-sm text-slate-500"><span class="font-bold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-lg">${item.quantity} db</span></div><div class="mt-auto pt-3 border-t flex items-center gap-2 text-xs font-medium ${isExpiring ? 'text-rose-600' : 'text-slate-500'}">Lejár: ${item.expiryDate}</div></div>`;
        }).join('');
      }
    }

    function renderStats() {
       statsTbody.innerHTML = `<tr><td class="px-6 py-4 text-slate-400 italic">Statisztika betöltve...</td></tr>`;
    }

    window.switchTab = function(tabId) {
      activeTab = tabId;
      tabContents.forEach(content => content.classList.add('hidden'));
      document.getElementById(`tab-${tabId}`).classList.remove('hidden');
    };

    navButtons.forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    parseInput.addEventListener('input', (e) => {
      parseBtn.disabled = !e.target.value.trim();
    });

    parseBtn.addEventListener('click', () => {
      const text = parseInput.value;
      if (!text.trim()) return;
      const lines = text.split('\n').filter(l => l.trim().length > 0);
      for (const line of lines) {
        const parts = line.split(',').map(p => p.trim());
        const quantityStr = parts.find(p => p.toLowerCase().includes('darab') || p.toLowerCase().includes('mennyiség'))?.split(':')[1]?.trim() || "1";
        const quantity = parseInt(quantityStr) || 1;
        items.push({
          id: Date.now().toString() + Math.random().toString(36).substring(2),
          brand: parts.find(p => p.toLowerCase().includes('márka'))?.split(':')[1]?.trim() || "Nincs",
          name: parts.find(p => p.toLowerCase().includes('név'))?.split(':')[1]?.trim() || line.substring(0, 15),
          quantity: quantity,
          initialQuantity: quantity,
          expiryDate: parts.find(p => p.toLowerCase().includes('lejárat'))?.split(':')[1]?.trim() || "2026-01-01",
          status: 'active'
        });
      }
      saveItems();
      parseInput.value = '';
      parseBtn.disabled = true;
      switchTab('inventory');
    });

    document.addEventListener('click', (e) => {
      const actionBtn = e.target.closest('button[data-action]');
      if (!actionBtn) return;
      const action = actionBtn.dataset.action;
      const id = actionBtn.dataset.id;
      const itemIndex = items.findIndex(i => i.id === id);
      if (itemIndex === -1) return;
      if (action === 'consume-one') {
        if (items[itemIndex].quantity > 1) items[itemIndex].quantity -= 1;
        else items[itemIndex].quantity = 0, items[itemIndex].status = 'consumed';
      } else if (action === 'consume-all') {
        items[itemIndex].quantity = 0, items[itemIndex].status = 'consumed';
      } else if (action === 'delete') {
        items.splice(itemIndex, 1);
      }
      saveItems();
    });

    // Indítás
    loadItems();
  </script>
</body>
</html>
